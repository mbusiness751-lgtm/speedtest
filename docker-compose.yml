version: '3.9'

services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: speedtest-backend
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      PORT:                  3001
      CORS_ORIGIN:           "http://localhost,https://yourdomain.com"
      MAX_UPLOAD_SIZE:       52428800
      RATE_LIMIT_WINDOW_MS:  60000
      RATE_LIMIT_MAX:        100
      LOG_LEVEL:             info
      SERVER_CITY:           "San Francisco"
      SERVER_COUNTRY:        US
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout:  5s
      retries:  3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus:   '1.0'

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: speedtest-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout:  5s
      retries:  3

networks:
  default:
    name: speedtest-net
    driver: bridge
